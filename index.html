<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Dashboard</title>
    <link rel="stylesheet" href="./src/main.css" type="text/css">
</head>
<body>
    <div class="container">
        <h1>WhatsApp Bot Dashboard</h1>
        
        <div id="status" class="status-disconnected">Status: Disconnected</div>

        <div id="mode-toggle">
            <button id="btn-pairing" class="mode-btn active">Use Phone Number</button>
            <button id="btn-qr" class="mode-btn inactive">Use QR Code</button>
        </div>
        
        <div id="pairing-container">
            <p>Enter your phone number (with country code, e.g. 60123456789):</p>
            <input type="text" id="phone-number" placeholder="Enter phone number" />
            <button id="request-code-btn">Get Pairing Code</button>
            
            <div id="pairing-code-display">
                <p>Enter this pairing code in WhatsApp:</p>
                <h2 id="pairing-code"></h2>
            </div>
        </div>

        <div id="qr-container">
            <p id="qr-message">Waiting for QR Code...</p>
            <div class="qr-wrapper">
                <img id="qrcode" alt="QR Code" />
            </div>
        </div>
        
        <div id="logs"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./src/dashboard.js"></script>
</body>
</html>
