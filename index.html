<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #128C7E;
            margin-bottom: 20px;
        }
        #qr-container {
            margin: 20px 0;
            min-height: 256px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #status {
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .status-disconnected { background-color: #ffebee; color: #c62828; }
        .status-connecting { background-color: #e3f2fd; color: #1565c0; }
        .status-connected { background-color: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WhatsApp Bot Dashboard</h1>
        
        <div id="status" class="status-disconnected">Status: Disconnected</div>

        <div id="mode-toggle" style="display: none; margin: 15px 0;">
            <button id="btn-pairing" style="padding: 8px 15px; margin-right: 5px; background-color: #128C7E; color: white; border: none; border-radius: 4px; cursor: pointer;">Use Phone Number</button>
            <button id="btn-qr" style="padding: 8px 15px; background-color: #eee; color: #333; border: none; border-radius: 4px; cursor: pointer;">Use QR Code</button>
        </div>
        
        <div id="pairing-container" style="display: none; margin: 20px 0;">
            <p>Enter your phone number (with country code, e.g. 60123456789):</p>
            <input type="text" id="phone-number" placeholder="Enter phone number" style="padding: 8px; width: 70%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;" />
            <button id="request-code-btn" style="padding: 8px 15px; background-color: #128C7E; color: white; border: none; border-radius: 4px; cursor: pointer;">Get Pairing Code</button>
            
            <div id="pairing-code-display" style="display: none; margin-top: 15px;">
                <p>Enter this pairing code in WhatsApp:</p>
                <h2 id="pairing-code" style="letter-spacing: 5px; font-family: monospace; background: #e3f2fd; padding: 10px; border-radius: 5px;"></h2>
            </div>
        </div>

        <div id="qr-container" style="display: none;">
            <p id="qr-message">Waiting for QR Code...</p>
            <div style="display: flex; justify-content: center; align-items: center; min-height: 256px;">
                <img id="qrcode" style="display: none; max-width: 100%;" alt="QR Code" />
            </div>
        </div>
        
        <div id="logs" style="text-align: left; font-size: 12px; height: 100px; overflow-y: auto; background: #eee; padding: 10px; border-radius: 5px; margin-top: 15px;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const statusEl = document.getElementById('status');
        const qrImg = document.getElementById('qrcode');
        const qrMessage = document.getElementById('qr-message');
        const qrContainer = document.getElementById('qr-container');
        const logsEl = document.getElementById('logs');
        
        const pairingContainer = document.getElementById('pairing-container');
        const phoneInput = document.getElementById('phone-number');
        const reqBtn = document.getElementById('request-code-btn');
        const codeDisplay = document.getElementById('pairing-code-display');
        const codeText = document.getElementById('pairing-code');
        const modeToggle = document.getElementById('mode-toggle');
        const btnPairing = document.getElementById('btn-pairing');
        const btnQR = document.getElementById('btn-qr');

        let currentMode = 'pairing'; // Mode can be 'pairing' or 'qr'

        btnPairing.addEventListener('click', () => {
            currentMode = 'pairing';
            btnPairing.style.backgroundColor = '#128C7E';
            btnPairing.style.color = 'white';
            btnQR.style.backgroundColor = '#eee';
            btnQR.style.color = '#333';
            pairingContainer.style.display = 'block';
            qrContainer.style.display = 'none';
        });

        btnQR.addEventListener('click', () => {
            currentMode = 'qr';
            btnQR.style.backgroundColor = '#128C7E';
            btnQR.style.color = 'white';
            btnPairing.style.backgroundColor = '#eee';
            btnPairing.style.color = '#333';
            pairingContainer.style.display = 'none';
            qrContainer.style.display = 'block';
        });

        reqBtn.addEventListener('click', () => {
            const phone = phoneInput.value.replace(/[^0-9]/g, '');
            if (phone) {
                socket.emit('request_pairing_code', phone);
                reqBtn.disabled = true;
                reqBtn.textContent = "Requesting...";
            }
        });

        socket.on('pairing_code', (code) => {
            codeDisplay.style.display = 'block';
            codeText.textContent = code;
            reqBtn.textContent = "Code Generated";
            addLog(`Pairing code received: ${code}`);
        });

        function addLog(msg) {
            const p = document.createElement('div');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logsEl.appendChild(p);
            logsEl.scrollTop = logsEl.scrollHeight;
        }

        socket.on('status', (data) => {
            statusEl.textContent = `Status: ${data.state}`;
            statusEl.className = '';
            
            if (data.state === 'connected') {
                statusEl.classList.add('status-connected');
                modeToggle.style.display = 'none';
                qrImg.style.display = 'none';
                qrMessage.style.display = 'none';
                pairingContainer.style.display = 'none';
                qrContainer.style.display = 'none';
                qrMessage.textContent = 'Successfully connected!';
            } else if (data.state === 'connecting') {
                statusEl.classList.add('status-connecting');
            } else if (data.state === 'waiting_for_scan' || data.state === 'pending') {
                statusEl.classList.add('status-disconnected');
                statusEl.textContent = 'Status: Waiting for Login';
                modeToggle.style.display = 'block';
                if (currentMode === 'pairing') {
                    pairingContainer.style.display = 'block';
                    qrContainer.style.display = 'none';
                } else {
                    pairingContainer.style.display = 'none';
                    qrContainer.style.display = 'block';
                }
            } else {
                statusEl.classList.add('status-disconnected');
            }
        });

        socket.on('qr', (qrDataUrl) => {
            qrMessage.style.display = 'none';
            qrImg.style.display = 'block';
            qrImg.src = qrDataUrl;
            addLog('Please scan the QR code.');
        });

        socket.on('log', (msg) => {
            addLog(msg);
        });
        
        socket.on('connect', () => {
            addLog('Connected to dashboard server');
        });
        
        socket.on('disconnect', () => {
            addLog('Disconnected from dashboard server');
            statusEl.textContent = 'Status: Server Offline';
            statusEl.className = 'status-disconnected';
            qrImg.style.display = 'none';
            qrMessage.style.display = 'block';
            qrMessage.textContent = 'Waiting for server...';
        });
    </script>
</body>
</html>
